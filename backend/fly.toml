app = 'claudehydra-v4-backend'
primary_region = 'arn'

# Multi-region: arn (Stockholm, primary), fra (Frankfurt), waw (Warsaw)
# Additional regions added via: fly machine clone --region fra/waw
# Fly.io Anycast routes to nearest healthy region automatically.
# All regions support independent scale-to-zero.

[build]
  # Build context is the workspace root (required for shared crates/).
  # Deploy: flyctl deploy --config ClaudeHydra/backend/fly.toml --dockerfile ClaudeHydra/backend/Dockerfile
  # Multi-region: ci/deploy-multiregion.sh ch arn,fra,waw
  dockerfile = "apps/ClaudeHydra/backend/Dockerfile"
  build_context = "."

[deploy]
  strategy = "rolling"

[http_service]
  internal_port = 8082
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "10s"
    method = "GET"
    path = "/api/health"

[env]
  # QW67: Production log level — warn for third-party, info for jaskier crates
  RUST_LOG = "warn,claudehydra=info,jaskier=info,tower_http=warn,axum=warn,sqlx=warn"
  RUST_LOG_FORMAT = "json"
  # Sentry error tracking — set via `fly secrets set SENTRY_DSN=https://...@sentry.io/...`
  # When unset, Sentry is a zero-cost no-op. Env var listed here for documentation only.
  # SENTRY_DSN = ""

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
