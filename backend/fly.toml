app = 'claudehydra-v4-backend'
primary_region = 'arn'

[build]
  # Build context is the workspace root (required for shared crates/).
  # Deploy command: flyctl deploy --config apps/ClaudeHydra/backend/fly.toml --dockerfile apps/ClaudeHydra/backend/Dockerfile
  # Or use the workspace root deploy-fly.ps1 script.
  dockerfile = "apps/ClaudeHydra/backend/Dockerfile"
  build_context = "."

[http_service]
  internal_port = 8082
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

[env]
  RUST_LOG = "info"
  RUST_LOG_FORMAT = "json"

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
